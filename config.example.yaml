# 院校雷达 - 示例配置文件
# 使用说明：
# 1. 复制本文件并重命名为 config.yaml
# 2. 修改以下配置信息

# AI 分析引擎配置
ai_provider: ''          # 可选: Google (Gemini), DeepSeek, OpenAI, aliyun, zhipu, kimi
api_key: ''              # 你的 AI API 密钥
base_url: ''             # API 端点地址
model_version: ''        # 模型名称

# 代理设置 (可选)
proxy: ''

# 监控设置
scan_interval: 15
relevance_threshold: 60

# 监控目标 (建议通过 Web 界面进行配置，配置后会自动生成)
selected_universities: []
selected_majors: []
graduate_urls: []
department_urls: []

# 通知渠道
notifications: []
